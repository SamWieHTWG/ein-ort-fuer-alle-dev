<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Spline Editor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; display: flex; flex-direction: column; height: 100vh; }
    #toolbar {
      display: flex; align-items: center; gap: 16px; padding: 10px 14px;
      background: #fff; border-bottom: 1px solid #ddd; flex-wrap: wrap;
    }
    #toolbar label { font-size: 13px; color: #555; }
    select, button, input[type=range] { font-size: 13px; }
    select, button {
      padding: 4px 10px; border-radius: 6px; border: 1px solid #ccc;
      background: #fff; cursor: pointer;
    }
    button:hover { background: #f0f0f0; }
    #status { font-size: 12px; color: #999; margin-left: auto; }
    #canvas-wrap { flex: 1; position: relative; }
    canvas { display: block; cursor: crosshair; background: #fff; }
    #output {
      padding: 10px 14px; border-top: 1px solid #ddd; background: #fafafa;
      font-size: 12px; font-family: monospace; color: #444;
      white-space: pre-wrap; max-height: 120px; overflow-y: auto;
    }
  </style>
</head>
<body>

<div id="toolbar">
  <label>Interpolation:</label>
  <select id="interp">
    <option value="cardinal">cardinal</option>
    <option value="monotone">monotone</option>
    <option value="linear">linear</option>
    <option value="basis">basis</option>
  </select>
  <label>Tension: <span id="tens-val">0.5</span></label>
  <input type="range" min="0" max="1" step="0.05" value="0.5" id="tension" style="width:80px">
  <button onclick="clearPoints()">Clear</button>
  <button onclick="copyOutput()">Copy params ↗</button>
  <span id="status">Click to add points · Drag to move · Delete key removes selected</span>
</div>

<div id="canvas-wrap">
  <canvas id="c"></canvas>
</div>
<div id="output"></div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const interpSel = document.getElementById('interp');
const tensionSl = document.getElementById('tension');
const tensVal = document.getElementById('tens-val');
const outEl = document.getElementById('output');
const wrap = document.getElementById('canvas-wrap');

let W, H;
function resize() {
  W = wrap.offsetWidth;
  H = wrap.offsetHeight;
  canvas.width = W;
  canvas.height = H;
  draw();
}

// Points stored as absolute px
let points = [
  { x: 0, y: 0 }, { x: 0, y: 0 }, { x: 0, y: 0 }, { x: 0, y: 0 }
];

let initialized = false;
function initDefaultPoints() {
  points = [
    { x: W * 0.15, y: H * 0.5 },
    { x: W * 0.35, y: H * 0.25 },
    { x: W * 0.6,  y: H * 0.75 },
    { x: W * 0.85, y: H * 0.4 }
  ];
  initialized = true;
}

let selected = -1;
let dragging = false;
let tension = 0.5;

tensionSl.addEventListener('input', () => {
  tension = parseFloat(tensionSl.value);
  tensVal.textContent = tension.toFixed(2);
  draw();
});

interpSel.addEventListener('change', draw);

// ── Spline math ──────────────────────────────────────────────

function catmullRomPoint(p0, p1, p2, p3, t) {
  const t2 = t * t, t3 = t2 * t;
  return {
    x: 0.5 * ((2*p1.x) + (-p0.x+p2.x)*t + (2*p0.x-5*p1.x+4*p2.x-p3.x)*t2 + (-p0.x+3*p1.x-3*p2.x+p3.x)*t3),
    y: 0.5 * ((2*p1.y) + (-p0.y+p2.y)*t + (2*p0.y-5*p1.y+4*p2.y-p3.y)*t2 + (-p0.y+3*p1.y-3*p2.y+p3.y)*t3)
  };
}

function cardinalPoint(p0, p1, p2, p3, t, alpha) {
  const s = (1 - alpha) / 2;
  const t2 = t*t, t3 = t2*t;
  return {
    x: (2*t3-3*t2+1)*p1.x + (t3-2*t2+t)*(p2.x-p0.x)*s + (-2*t3+3*t2)*p2.x + (t3-t2)*(p3.x-p1.x)*s,
    y: (2*t3-3*t2+1)*p1.y + (t3-2*t2+t)*(p2.y-p0.y)*s + (-2*t3+3*t2)*p2.y + (t3-t2)*(p3.y-p1.y)*s
  };
}

function basisPoint(p0, p1, p2, p3, t) {
  const t2 = t*t, t3 = t2*t;
  return {
    x: (1/6)*((-t3+3*t2-3*t+1)*p0.x + (3*t3-6*t2+4)*p1.x + (-3*t3+3*t2+3*t+1)*p2.x + t3*p3.x),
    y: (1/6)*((-t3+3*t2-3*t+1)*p0.y + (3*t3-6*t2+4)*p1.y + (-3*t3+3*t2+3*t+1)*p2.y + t3*p3.y)
  };
}

function monotoneSlopes(pts) {
  const n = pts.length;
  const dx = [], dy = [], m = [], s = [];
  for (let i = 0; i < n-1; i++) {
    dx[i] = pts[i+1].x - pts[i].x;
    dy[i] = pts[i+1].y - pts[i].y;
    s[i] = dx[i] !== 0 ? dy[i]/dx[i] : 0;
  }
  m[0] = s[0];
  for (let i = 1; i < n-1; i++) m[i] = (s[i-1]+s[i])/2;
  m[n-1] = s[n-2];
  for (let i = 0; i < n-1; i++) {
    if (s[i] === 0) { m[i] = m[i+1] = 0; continue; }
    const a = m[i]/s[i], b = m[i+1]/s[i];
    if (a*a + b*b > 9) { const tau = 3/Math.sqrt(a*a+b*b); m[i]=tau*a*s[i]; m[i+1]=tau*b*s[i]; }
  }
  return m;
}

function buildPath(pts) {
  const mode = interpSel.value;
  const n = pts.length;
  if (n < 2) return;

  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);

  if (mode === 'linear') {
    for (let i = 1; i < n; i++) ctx.lineTo(pts[i].x, pts[i].y);
    return;
  }

  const steps = 30;

  if (mode === 'monotone') {
    const m = monotoneSlopes(pts);
    for (let i = 0; i < n-1; i++) {
      const dx = pts[i+1].x - pts[i].x;
      ctx.bezierCurveTo(
        pts[i].x + dx/3, pts[i].y + m[i]*dx/3,
        pts[i+1].x - dx/3, pts[i+1].y - m[i+1]*dx/3,
        pts[i+1].x, pts[i+1].y
      );
    }
    return;
  }

  for (let i = 0; i < n-1; i++) {
    const p0 = pts[Math.max(0, i-1)];
    const p1 = pts[i];
    const p2 = pts[i+1];
    const p3 = pts[Math.min(n-1, i+2)];
    for (let j = 1; j <= steps; j++) {
      const t = j / steps;
      let pt;
      if (mode === 'cardinal') pt = cardinalPoint(p0, p1, p2, p3, t, tension);
      else if (mode === 'basis') pt = basisPoint(p0, p1, p2, p3, t);
      else pt = catmullRomPoint(p0, p1, p2, p3, t);
      ctx.lineTo(pt.x, pt.y);
    }
  }
}

// ── Draw ─────────────────────────────────────────────────────

function draw() {
  if (!initialized) return;
  ctx.clearRect(0, 0, W, H);

  // Grid
  ctx.strokeStyle = '#f0f0f0';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 50) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = 0; y < H; y += 50) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  if (points.length >= 2) {
    // Shadow
    ctx.save();
    buildPath(points);
    ctx.strokeStyle = 'rgba(0,0,0,0.06)';
    ctx.lineWidth = 6;
    ctx.stroke();
    ctx.restore();

    // Spline
    buildPath(points);
    ctx.strokeStyle = '#378ADD';
    ctx.lineWidth = 2.5;
    ctx.lineJoin = 'round';
    ctx.stroke();
  }

  // Control lines
  ctx.setLineDash([4, 4]);
  ctx.strokeStyle = '#bbb';
  ctx.lineWidth = 1;
  ctx.beginPath();
  points.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
  ctx.stroke();
  ctx.setLineDash([]);

  // Points
  points.forEach((p, i) => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, 8, 0, Math.PI * 2);
    ctx.fillStyle = i === selected ? '#E24B4A' : '#fff';
    ctx.fill();
    ctx.strokeStyle = i === selected ? '#A32D2D' : '#378ADD';
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.fillStyle = '#333';
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(i + 1, p.x, p.y - 14);
  });

  updateOutput();
}

function updateOutput() {
  const mode = interpSel.value;
  const normalized = points.map(p => ({
    x: parseFloat((p.x / W).toFixed(4)),
    y: parseFloat((p.y / H).toFixed(4))
  }));

  let txt = `interpolation: "${mode}"`;
  if (mode === 'cardinal') txt += `\ntension: ${tension.toFixed(2)}`;
  txt += `\npoints (normalized 0–1):\n`;
  normalized.forEach((p, i) => {
    txt += `  [${i+1}] x: ${p.x.toFixed(4)}, y: ${p.y.toFixed(4)}\n`;
  });
  txt += `\npoints (px, canvas ${W}×${H}):\n`;
  points.forEach((p, i) => {
    txt += `  [${i+1}] x: ${Math.round(p.x)}, y: ${Math.round(p.y)}\n`;
  });
  outEl.textContent = txt;
}

function clearPoints() {
  initDefaultPoints();
  selected = -1;
  draw();
}

function copyOutput() {
  navigator.clipboard.writeText(outEl.textContent).then(() => {
    const b = document.querySelector('button:nth-of-type(2)');
    const orig = b.textContent;
    b.textContent = 'Copied!';
    setTimeout(() => b.textContent = orig, 1500);
  });
}

// ── Mouse events ──────────────────────────────────────────────

function getPos(e) {
  const r = canvas.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return { x: src.clientX - r.left, y: src.clientY - r.top };
}

function hitTest(pos) {
  for (let i = points.length - 1; i >= 0; i--) {
    const dx = points[i].x - pos.x, dy = points[i].y - pos.y;
    if (Math.sqrt(dx*dx + dy*dy) < 12) return i;
  }
  return -1;
}

canvas.addEventListener('mousedown', e => {
  const pos = getPos(e);
  const hit = hitTest(pos);
  if (hit >= 0) {
    selected = hit;
    dragging = true;
  } else {
    points.push({ x: pos.x, y: pos.y });
    selected = points.length - 1;
    dragging = true;
  }
  draw();
});

canvas.addEventListener('mousemove', e => {
  if (!dragging || selected < 0) return;
  const pos = getPos(e);
  points[selected] = { x: Math.max(0, Math.min(W, pos.x)), y: Math.max(0, Math.min(H, pos.y)) };
  draw();
});

canvas.addEventListener('mouseup', () => { dragging = false; });
canvas.addEventListener('mouseleave', () => { dragging = false; });

window.addEventListener('keydown', e => {
  if ((e.key === 'Delete' || e.key === 'Backspace') && selected >= 0 && points.length > 2) {
    points.splice(selected, 1);
    selected = Math.min(selected, points.length - 1);
    draw();
    e.preventDefault();
  }
});

// ── Init ──────────────────────────────────────────────────────

window.addEventListener('resize', resize);
// Use ResizeObserver for wrap element
new ResizeObserver(() => {
  W = wrap.offsetWidth;
  H = wrap.offsetHeight;
  canvas.width = W;
  canvas.height = H;
  if (!initialized) initDefaultPoints();
  draw();
}).observe(wrap);

resize();
if (!initialized) initDefaultPoints();
draw();
</script>
</body>
</html>
